<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Name — Art</title>
    <meta name="description" content="Artwork, links, and contact." />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="overlay scanlines" aria-hidden="true"></div>
    <div class="overlay grain" aria-hidden="true"></div>

    <main class="wrap">
      <section class="hero">
        <div>
          <h1 class="glitch" data-text="GLITCH SIGNAL">GLITCH SIGNAL</h1>
          <p class="sub">
            Digital artwork + experiments in texture, light, and noise.
          </p>

          <div class="cta-row">
            <a class="btn primary" href="https://instagram.com" target="_blank" rel="noreferrer">Instagram</a>
            <a class="btn" href="https://x.com" target="_blank" rel="noreferrer">X</a>
            <a class="btn" href="https://linktr.ee" target="_blank" rel="noreferrer">Link Hub</a>
            <a class="btn" href="mailto:you@email.com">Email</a>
          </div>

          <p class="sub" style="margin-top:14px;">
            <span style="opacity:.7;">Signal:</span>
            <span id="signal" style="margin-left:8px;">SIG: 0000</span>
          </p>
        </div>

        <div class="tile">
          <img
            src="https://images.unsplash.com/photo-1520975693411-b0d6f0bdfb73?auto=format&fit=crop&w=1600&q=80"
            alt="Featured artwork"
          />
        </div>
      </section>

      <section class="grid" style="margin-top:26px;">
        <a class="tile" href="#" aria-label="Artwork 1">
          <img src="https://images.unsplash.com/photo-1520975958225-9e85b7b4f5d7?auto=format&fit=crop&w=1400&q=80" alt="Artwork 1" />
        </a>
        <a class="tile" href="#" aria-label="Artwork 2">
          <img src="https://images.unsplash.com/photo-1545239351-1141bd82e8a6?auto=format&fit=crop&w=1400&q=80" alt="Artwork 2" />
        </a>
        <a class="tile" href="#" aria-label="Artwork 3">
          <img src="https://images.unsplash.com/photo-1557682250-33bd709cbe85?auto=format&fit=crop&w=1400&q=80" alt="Artwork 3" />
        </a>
        <a class="tile" href="#" aria-label="Artwork 4">
          <img src="https://images.unsplash.com/photo-1520975684835-643f0a5f8b69?auto=format&fit=crop&w=1400&q=80" alt="Artwork 4" />
        </a>
        <a class="tile" href="#" aria-label="Artwork 5">
          <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f?auto=format&fit=crop&w=1400&q=80" alt="Artwork 5" />
        </a>
        <a class="tile" href="#" aria-label="Artwork 6">
          <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=1400&q=80" alt="Artwork 6" />
        </a>
      </section>

      <footer>
        <span>© <span id="year"></span> YOUR NAME</span>
        <span style="opacity:.7;">Built with a little noise</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
